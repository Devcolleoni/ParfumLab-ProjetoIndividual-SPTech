<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="cadastro.css">
</head>
<body>

<div class="pagina-auth">

  <div class="fundo-escuro"></div>

  <div class="caixa-formulario">
    <h2 class="titulo-formulario">Criar Conta</h2>

    <form>
      <input class="input-formulario" type="text" placeholder="Nome" required>
      <input class="input-formulario" type="email" placeholder="Email" required>
      <input class="input-formulario" type="password" placeholder="Senha" required>
      <input class="input-formulario" type="password" placeholder="Confirmar Senha" required>
      <button class="botao-formulario">Cadastrar</button>
    </form>

    <p class="texto-formulario">
      Já tem conta?
      <a class="link-formulario" href="login.html">Entrar</a>
    </p>
  </div>

</div>

</body>
</html>
