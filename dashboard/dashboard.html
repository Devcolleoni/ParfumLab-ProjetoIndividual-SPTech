<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Parfum Lab</title>
  <link rel="stylesheet" href="dash.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="sidebar">
    <div class="logo-container">
      <div class="logotipo">PARFUM LAB</div>
      <div class="logo-subtitulo">Dashboard</div>
    </div>

    <div class="saudacao">
      Olá, <strong>Gustavo</strong>!
    </div>

    <div class="menu">
      <a href="perfumes..html">Perfumes</a>
      <a href="avaliarPerfumes.html">Avaliar Fragrância</a>
      <a href="verAvaliacao.html">Ver Avaliações</a>
      <a href="dashboard.html" class="ativo">Dashboard</a>
    </div>

    <button onclick="sair()" class="sair">Sair</button>
  </div>


  <div class="conteudo-central">
    <h1>Dashboard</h1>
    <p class="descricao">Visão geral das avaliações dos perfumes</p>

    <div class="graficos-container">

      <div class="grafico-box">
        <h3>Nota Média por Perfume</h3>
        <canvas id="chartNotasPerfumes"></canvas>
      </div>


      <div class="grafico-box">
        <h3>Quantidade de Avaliações por Perfume</h3>
        <canvas id="chartQuantidade"></canvas>
      </div>

    </div>
  </div>
</body>
</html>
  <script>
    new Chart(document.getElementById('chartNotasPerfumes'), {
      type: 'doughnut',
      data: {
        labels: [
          'Sauvage',
          'Yves Saint Laurent',
          'Jean Paul Gaultier Le Male',
          'Egeo'
        ],
        datasets: [{
          data: [4.8, 4.5, 4.7, 3.9],
          backgroundColor: [
            '#f5e8d3',
            '#d4b88a',
            '#a67b5b',
            '#75523f'
          ],
          borderColor: '#0a0a0a',
          borderWidth: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              color: '#ddd',
              font: { size: 14 },
              padding: 20
            }
          },
          tooltip: {
            callbacks: {
              label: function (context) {
                return context.label + ': ' + context.raw + ' ★';
              }
            }
          }
        }
      }
    });


    new Chart(document.getElementById('chartQuantidade'), {
      type: 'bar',
      data: {
        labels: [
          'Sauvage',
          'Yves Saint Laurent',
          'Jean Paul Gaultier Le Male',
          'Egeo'
        ],
        datasets: [{
          label: 'Número de Avaliações',
          data: [89, 67, 52, 40],
          backgroundColor: '#a67b5b',
          borderColor: '#f5e8d3',
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: '#333' },
            ticks: { color: '#ddd' }
          },
          x: {
            grid: { color: '#333' },
            ticks: { color: '#ddd' }
          }
        },
        plugins: {
          legend: { display: false }
        }
      }
    });

    function sair() {

      window.location.href = "/login.html";
    }
  </script>
