<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  
  <link rel="stylesheet" href="cadastro.css">
  <link rel="icon" href="../imgs/sauvage-icon.png">
  
</head>
<body>

<div class="pagina-auth">

  <div class="fundo-escuro"></div>

  <div class="caixa-formulario">
    <h2 class="titulo-formulario">Login</h2>

    <form onsubmit="logar(); return false;">
      <input id="email" class="input-formulario" type="text" placeholder="Email">
      <input id="senha" class="input-formulario" type="password" placeholder="Senha">
      <button class="botao-formulario">Entrar</button>
    </form>

    <p id="mensagem" class="texto-formulario"></p>

    <p class="texto-formulario">
      Não tem conta?
      <a class="link-formulario" href="cadastro.html">Cadastre-se</a>
    </p>
  </div>

</div>

<script>
  function logar() {

    let user = email.value;
    let senhaDigitada = senha.value;

    if (user == "" || senhaDigitada == "") {
      mensagem.innerHTML = "Preencha todos os campos!";
      mensagem.style.color = "red";
      return;
    }

    if (!user.includes("@") || !user.includes(".com")) {
      mensagem.innerHTML = "Digite um e-mail válido!";
      mensagem.style.color = "red";
      return;
    }


    if (user == "teste@gmail.com" && senhaDigitada == "123456") {

      mensagem.innerHTML = "Login realizado com sucesso!";
      mensagem.style.color = "green";

      alert("Bem-vindo " + user);

     window.location.replace('/dashboard/avaliarPerfumes.html');

    

    } else {
      mensagem.innerHTML = "Usuário ou senha inválidos!";
      mensagem.style.color = "red";
    }
  }
</script>

</body>
</html>
