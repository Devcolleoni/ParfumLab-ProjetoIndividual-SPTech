<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  
  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="icon" href="imgs/bannerLogin.png">
</head>
<body>

<div class="pagina-auth">

  <div class="fundo-escuro"></div>

  <div class="caixa-formulario">
    <h2 class="titulo-formulario">Login</h2>

    <form onsubmit="logar(); return false;">
      <input id="email" class="input-formulario" type="text" placeholder="Email">
      <input id="senha" class="input-formulario" type="password" placeholder="Senha">
      <button class="botao-formulario">Entrar</button>
    </form>

    <p id="mensagem" class="texto-formulario"></p>

    <p class="texto-formulario">
      Não tem conta?
      <a class="link-formulario" href="cadastro.html">Cadastre-se</a>
    </p>
  </div>

</div>
</body>
</html>
<script>
function logar() {

  let user = document.getElementById("email").value;
  let senhaDigitada = document.getElementById("senha").value;

  if (user == "" || senhaDigitada == "") {
    mensagem.innerHTML = "Preencha todos os campos!";
    mensagem.style.color = "red";
    return;
  }

  fetch("/usuarios/autenticar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      emailServer: user,
      senhaServer: senhaDigitada
    })
  })
  .then(res => {
    if (res.ok) return res.json();
    else throw new Error("Login inválido");
  })
  .then(data => {

    sessionStorage.ID_USUARIO = data.id;
    sessionStorage.NOME_USUARIO = data.nome;
    sessionStorage.EMAIL_USUARIO = data.email;

    mensagem.innerHTML = "Login realizado com sucesso!";
    mensagem.style.color = "green";

    setTimeout(() => {
      window.location = "dashboard/perfumes..html";
    }, 1000);

  })
  .catch(err => {
    mensagem.innerHTML = "Usuário ou senha inválidos!";
    mensagem.style.color = "red";
  });
}
</script>
